services:
  erasarr:
    build: .
    container_name: erasarr
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data        # Persistent config, state, auth stored here
    environment:
      - DATA_DIR=/data
      - PORT=5000
      # Optional: set a fixed secret key so sessions survive restarts
      # - SECRET_KEY=change_me_to_something_random_and_long
    restart: unless-stopped
