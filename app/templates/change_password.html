{% extends "base.html" %}
{% block title %}Change Password — Erasarr{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block page_sub %}Update your login credentials{% endblock %}

{% block content %}
<div class="card" style="max-width:440px;">
  <div class="card-title">◌ New Password</div>
  <form method="POST">
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input class="form-input" type="password" name="new_password" minlength="8" required>
      <div class="form-hint">Minimum 8 characters</div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-input" type="password" name="confirm_password" minlength="8" required>
    </div>
    <div class="btn-group">
      <button type="submit" class="btn btn-primary">Update Password</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
